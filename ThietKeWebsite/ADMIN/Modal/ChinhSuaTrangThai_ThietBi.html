<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Chỉnh sửa Trạng thái Thiết bị - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 h-screen overflow-hidden flex flex-col">

 <div id="modal-sua-trang-thai-thiet-bi" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] items-center justify-center p-4 transition-all animate-fade-in">
    
    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden border border-gray-100 flex flex-col transform scale-100 transition-transform">
        
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-white">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-xl flex items-center justify-center text-lg border border-purple-100">
                    <i class="fa-solid fa-wrench"></i>
                </div>
                <div>
                    <h2 class="text-xl font-extrabold text-gray-900 leading-tight">Chỉnh sửa trạng thái thiết bị</h2>
                    <p class="text-xs text-gray-400 font-medium">Mã: <span class="text-purple-600 font-mono font-bold">DEV-DELL-0092</span></p>
                </div>
            </div>
            <button type="button" class="text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg w-8 h-8 flex items-center justify-center transition-all cursor-pointer">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <form class="p-6 space-y-5">
            
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200/60 flex items-center space-x-3">
                <div class="w-9 h-9 bg-white text-gray-500 border border-gray-200 rounded-lg flex items-center justify-center text-sm shadow-2xs">
                    <i class="fa-solid fa-tv"></i>
                </div>
                <div>
                    <h4 class="text-xs font-black text-gray-400 uppercase tracking-wider">Tên thiết bị đang chọn</h4>
                    <p class="text-sm font-bold text-gray-900 mt-0.5">Màn hình Dell UltraSharp 27"</p>
                </div>
            </div>

            <div class="space-y-2.5">
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest">Cập nhật trạng thái mới <span class="text-red-500">*</span></label>
                
                <div class="space-y-2">
                    
                    <label class="relative flex items-center p-3.5 rounded-xl border-2 border-emerald-500 bg-emerald-50/20 cursor-pointer transition-all">
                        <input type="radio" name="TRANG_THAI_THIET_BI" value="good" class="hidden" checked>
                        <div class="w-5 h-5 bg-emerald-500 text-white rounded-full flex items-center justify-center text-[10px] shrink-0">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-xs font-black text-emerald-900 uppercase tracking-wide">Hoạt động tốt</p>
                            <p class="text-[11px] text-emerald-700/80 mt-0.5">Thiết bị vận hành bình thường, sẵn sàng cho khách thuê</p>
                        </div>
                        <div class="absolute right-4 text-emerald-600"><i class="fa-solid fa-circle-check"></i></div>
                    </label>

                    <label class="relative flex items-center p-3.5 rounded-xl border-2 border-gray-200 bg-white hover:border-amber-300 cursor-pointer group transition-all">
                        <input type="radio" name="TRANG_THAI_THIET_BI" value="maintenance" class="hidden">
                        <div class="w-5 h-5 bg-gray-200 group-hover:bg-amber-400 text-transparent group-hover:text-white rounded-full flex items-center justify-center text-[10px] shrink-0 transition-colors">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-xs font-black text-gray-400 group-hover:text-amber-900 uppercase tracking-wide transition-colors">Cần bảo dưỡng / Kiểm tra</p>
                            <p class="text-[11px] text-gray-400 mt-0.5">Thiết bị có dấu hiệu lỗi nhẹ nhưng chưa cần mang đi sửa</p>
                        </div>
                        <div class="absolute right-4 text-gray-200 group-hover:text-amber-400 opacity-0 group-hover:opacity-100 transition-all"><i class="fa-solid fa-circle"></i></div>
                    </label>
                </div>
            </div>

        

        </form>

        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end space-x-3">
            <button type="button" class="px-4 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition cursor-pointer">
                Hủy bỏ
            </button>
            <button type="submit" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl transition shadow-lg shadow-indigo-100 flex items-center cursor-pointer">
                <i class="fa-solid fa-floppy-disk mr-2 text-xs"></i> Lưu trạng thái mới
            </button>
        </div>

    </div>
</div>
</body>
</html>
