<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm thiết bị mới - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-gray-800">

<div id="modal-cau-hinh-ghe" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
    
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl border border-slate-100 flex flex-col overflow-hidden animate-in fade-in zoom-in-95 duration-200">
        
        <div class="px-5 py-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-indigo-600">
                <div class="w-7 h-7 rounded-lg bg-indigo-50 flex items-center justify-center">
                    <i class="fa-solid fa-chair text-sm"></i>
                </div>
                <h3 class="text-xs font-black text-gray-900 uppercase tracking-wider">Thêm ghế vào sơ đồ</h3>
            </div>
            <button type="button" id="btn-close-modal" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg p-1.5 transition-all cursor-pointer">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>

        <form id="form-cau-hinh-ghe" class="p-5 text-xs">
            <div class="space-y-1.5">
                <label class="block font-black text-gray-400 uppercase tracking-widest mb-1">Tên ghế / Mã số ghế</label>
                <input type="text" name="MA_GHE" value="A-05" placeholder="Ví dụ: A-05, B-12..." autofocus
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-black text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all">
                <p class="text-[10px] text-gray-400 font-medium pt-0.5">Mẹo: Nên đặt theo định dạng [Khu vực] - [Số thứ tự].</p>
            </div>
        </form>

        <div class="px-5 py-3.5 bg-slate-50 border-t border-slate-100 flex items-center justify-end space-x-2">
            <button type="button" id="btn-cancel-modal" class="px-4 py-2 text-xs font-bold text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition cursor-pointer">Hủy</button>
            <button type="submit" form="form-cau-hinh-ghe" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-md shadow-indigo-100 flex items-center cursor-pointer">
                <i class="fa-solid fa-check mr-1.5"></i> Xác nhận đặt
            </button>
        </div>

    </div>
</div>


</body>
</html>
