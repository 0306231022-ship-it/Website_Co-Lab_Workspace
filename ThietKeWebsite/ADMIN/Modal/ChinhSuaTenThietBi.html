<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Thêm Chi nhánh - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 h-screen overflow-hidden flex flex-col">

   <div id="editDeviceNameModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-xs"></div>

    <div class="relative w-full max-w-lg bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden transform transition-all animate-in fade-in zoom-in-95 duration-200">
        
        <div class="px-6 py-4 bg-white border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600 text-sm">
                    <i class="fa-solid fa-pen-to-square"></i>
                </div>
                <div>
                    <h3 class="text-base font-black text-gray-900">Chỉnh sửa thiết bị</h3>
                    <p class="text-xs text-gray-400 font-medium">Cập nhật thông tin nhận diện trong hệ thống</p>
                </div>
            </div>
            <button type="button" class="w-8 h-8 rounded-lg inline-flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>

        <form class="p-6 space-y-5">
            
            <div class="space-y-1.5">
                <label class="text-xs font-black text-gray-500 uppercase tracking-wider block">Mã định danh (ID)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-fingerprint text-xs"></i>
                    </span>
                    <input type="text" value="DEV-DELL-0092" readonly class="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl text-sm font-bold text-gray-400 font-mono cursor-not-allowed">
                </div>
            </div>

            <div class="space-y-1.5">
                <label for="deviceName" class="text-xs font-black text-gray-500 uppercase tracking-wider block">Tên thiết bị <span class="text-red-500">*</span></label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-desktop text-xs"></i>
                    </span>
                    <input type="text" id="deviceName" value="Màn hình Dell UltraSharp 27" placeholder="Nhập tên thiết bị..." class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-semibold text-gray-900 focus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 transition-all">
                </div>
            </div>

          
        </form>

        <div class="px-6 py-4 bg-slate-50 border-t border-gray-100 flex items-center justify-end space-x-2">
            <button type="button" class="px-4 py-2 bg-white hover:bg-gray-100 text-gray-500 text-xs font-bold rounded-xl border border-gray-200 shadow-3xs transition-all cursor-pointer">
                Hủy bỏ
            </button>
            <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-xs hover:shadow-sm transition-all cursor-pointer">
                Lưu thay đổi
            </button>
        </div>

    </div>
</div>

</body>
</html>
