<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Thêm Chi nhánh - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 h-screen overflow-hidden flex flex-col">

    <div id="branchModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden" id="branchModalContent">
            
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50">
                <h2 class="text-xl font-extrabold text-gray-900 flex items-center">
                    <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center mr-3 text-sm">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    Thêm Chi nhánh mới
                </h2>
                <a href="../QuanLyChiNhanh.html" class="text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg w-8 h-8 flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </a>
            </div>

            <form id="formAddBranch" class="p-6 space-y-5" enctype="multipart/form-data">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">Tên chi nhánh <span class="text-red-500">*</span></label>
                    <input type="text" name="TEN_CHI_NHANH" placeholder="VD: Co-Lab Quận 1" required 
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all text-gray-900 font-medium">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5">Địa chỉ <span class="text-red-500">*</span></label>
                    <input type="text" name="DIA_CHI" placeholder="VD: 123 Nguyễn Đình Chiểu, Phường 6, Quận 1, TP. HCM" required 
                           class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all text-gray-900 font-medium">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Ảnh chi nhánh đại diện <span class="text-red-500">*</span></label>
                    
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-5 bg-gray-50/50 hover:bg-white hover:border-indigo-500 transition-all flex flex-col items-center justify-center text-center group">
                        <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mb-2.5 group-hover:scale-110 transition-transform duration-300 border border-indigo-100">
                            <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
                        </div>
                        
                        <p class="text-xs font-bold text-gray-800 mb-1">Click vào nút bên dưới để chọn ảnh</p>
                        <p class="text-[11px] text-gray-400 mb-4">Định dạng hỗ trợ: JPG, PNG, WEBP (Hệ thống chỉ nhận 1 ảnh)</p>

                        <input type="file" name="ANH_CHI_NHANH" accept="image/*" required
                               class="text-xs text-gray-500 font-medium max-w-full
                                      file:mr-3 file:py-2 file:px-4 file:border-0 file:text-xs file:font-bold file:rounded-lg
                                      file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 file:transition-colors file:cursor-pointer
                                      focus:outline-none cursor-pointer">
                    </div>
                </div>
                </form>

            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end space-x-3">
                <button type="button" class="px-5 py-2.5 text-sm font-bold text-gray-500 hover:bg-gray-200 hover:text-gray-700 rounded-xl transition">Hủy bỏ</button>
                <button type="submit" form="formAddBranch" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl transition shadow-md shadow-indigo-600/20 flex items-center">
                    <i class="fa-solid fa-check mr-2"></i> Lưu Chi nhánh
                </button>
            </div>

        </div>
    </div>

</body>
</html>
