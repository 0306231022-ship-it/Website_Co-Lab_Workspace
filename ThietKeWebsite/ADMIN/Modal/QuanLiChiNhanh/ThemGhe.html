<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Studio Thiết Lập Sơ Đồ - Creative Zone</title>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col relative">

 <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50">
    
    <div class="bg-white rounded-2xl border border-gray-100 shadow-xl w-full max-w-md overflow-hidden m-4 transform transition-all">
        
        <div class="px-5 py-4 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center text-sm border border-indigo-100">
                    <i class="fa-solid fa-chair"></i>
                </div>
                <div>
                    <h3 class="text-sm font-black text-gray-900 uppercase tracking-wide">Cấu hình ghế mới</h3>
                    <p class="text-[10px] text-gray-400 font-medium">Tọa độ ô lưới: <span class="font-mono font-bold text-gray-500">X: 120, Y: 180</span></p>
                </div>
            </div>
            <button type="button" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1.5 rounded-lg transition cursor-pointer">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>

        <div class="p-5 space-y-4">
            
            <div>
                <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">
                    Tên / Mã số ghế <span class="text-red-500">*</span>
                </label>
                <div class="relative flex items-center">
                    <span class="absolute left-3 text-gray-400 text-xs"><i class="fa-solid fa-font"></i></span>
                    <input type="text" 
                           class="w-full bg-gray-50 border border-gray-200 focus:border-indigo-500 focus:bg-white text-sm font-bold text-gray-900 rounded-xl pl-9 pr-4 py-2.5 focus:outline-none transition-all placeholder:text-gray-300" 
                           placeholder="Ví dụ: A-01, VIP-10..." 
                           value="G-12">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5">
                    Danh mục loại ghế
                </label>
                <div class="relative flex items-center">
                    <span class="absolute left-3 text-gray-400 text-xs"><i class="fa-solid fa-layer-group"></i></span>
                    <select class="w-full bg-gray-50 border border-gray-200 focus:border-indigo-500 focus:bg-white text-sm font-bold text-gray-700 rounded-xl pl-9 pr-10 py-2.5 focus:outline-none transition-all cursor-pointer appearance-none">
                        <option value="Standard" selected>🪑 Ghế đơn tiêu chuẩn (Co-working)</option>
                        <option value="Ergonomic">✨ Ghế công thái học cao cấp</option>
                        <option value="Couple">👩‍❤️‍👨 Ghế đôi (Couple Seat)</option>
                        <option value="Sofa">🛋️ Ghế Sofa thư giãn</option>
                        <option value="Fixed">🔒 Chỗ ngồi cố định cá nhân</option>
                    </select>
                    <span class="absolute right-3.5 text-gray-400 pointer-events-none text-[10px]"><i class="fa-solid fa-chevron-down"></i></span>
                </div>
            </div>


        </div>

        <div class="px-5 py-3.5 bg-gray-50 border-t border-gray-100 flex items-center justify-end space-x-2">
            <button type="button" class="px-4 py-2 text-xs font-bold text-gray-500 hover:bg-gray-100 rounded-xl transition cursor-pointer">
                Hủy bỏ
            </button>
            <button type="button" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-md shadow-indigo-600/10 flex items-center cursor-pointer">
                <i class="fa-solid fa-check mr-1.5"></i> Xác nhận tạo ghế
            </button>
        </div>

    </div>
</div>
</body>
</html>
