<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện Thêm Chi nhánh - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 h-screen overflow-hidden flex flex-col">


<div id="add-rate-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-950/40 backdrop-blur-xs"></div>
    
    <div class="bg-white rounded-2xl border border-slate-100 shadow-2xl w-full max-w-md overflow-hidden relative z-10 flex flex-col max-h-[90vh]">
        
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center text-sm">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-900">Thêm đơn giá cho danh mục</h3>
                    <p class="text-[11px] text-slate-400 font-medium">Thiết lập mức giá mới gắn liền với loại ghế</p>
                </div>
            </div>
            <button type="button" class="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors cursor-pointer">
                <i class="fa-solid fa-xmark text-base"></i>
            </button>
        </div>
        
        <form id="add-rate-form" class="flex flex-col flex-1 overflow-y-auto">
            <div class="p-6 space-y-4 flex-1">
                
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide flex items-center gap-1">
                        Mã đơn giá mới (ID hệ thống)
                    </label>
                    <div class="relative flex items-center">
                        <input type="text" readonly value="RATE_012"
                               class="w-full text-xs font-mono font-bold px-3.5 py-2.5 bg-slate-100/80 border border-slate-200 text-slate-500 rounded-xl cursor-not-allowed tracking-wider">
                        <span class="absolute right-3.5 text-[10px] bg-slate-200 text-slate-600 font-bold px-1.5 py-0.5 rounded font-sans tracking-normal flex items-center gap-1">
                            <i class="fa-solid fa-lock text-[9px]"></i> Auto-increment
                        </span>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="id-danh-muc-ghe" class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center gap-1">
                        Áp dụng cho danh mục ghế <span class="text-rose-500">*</span>
                    </label>
                    <select id="id-danh-muc-ghe" required class="w-full text-sm px-3.5 py-2.5 bg-white border border-slate-200 rounded-xl shadow-3xs focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-medium text-slate-700">
                        <option value="" disabled selected>-- Chọn danh mục ghế nhận giá này --</option>
                        <option value="1">Ghế Công thái học (Ergonomic)</option>
                        <option value="2">Ghế Gaming Pro</option>
                        <option value="3">Ghế Sofa đơn tiêu chuẩn</option>
                        <option value="4">Hot-desk (Chỗ ngồi tự do)</option>
                    </select>
                </div>
                
                <div class="space-y-1.5">
                    <label for="gia-theo-gio" class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center gap-1">
                        Đơn giá tiêu chuẩn (VND / 1 Giờ) <span class="text-rose-500">*</span>
                    </label>
                    <div class="relative flex items-center">
                        <input type="number" id="gia-theo-gio" required min="0" placeholder="35000" 
                               class="w-full text-sm pl-3.5 pr-16 py-2.5 bg-white border border-slate-200 rounded-xl shadow-3xs focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-mono font-bold text-slate-800">
                        <span class="absolute right-3.5 text-xs font-bold text-slate-400 pointer-events-none">đ / giờ</span>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="trang-thai" class="text-xs font-bold text-slate-600 uppercase tracking-wide flex items-center gap-1">
                        Trạng thái áp dụng liền?
                    </label>
                    <select id="trang-thai" class="w-full text-sm px-3.5 py-2.5 bg-white border border-slate-200 rounded-xl shadow-3xs focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-medium text-slate-700">
                        <option value="1">Kích hoạt ngay (Hệ thống tự gỡ bỏ giá cũ)</option>
                        <option value="0">Lưu nháp (Chưa áp dụng vào thực tế)</option>
                    </select>
                    <span class="text-[10px] text-amber-600 font-medium block leading-normal">
                        <i class="fa-solid fa-triangle-exclamatirion mr-0.5"></i> Khi chọn "Kích hoạt ngay", hệ thống tự động tắt (Inactivate) các đơn giá cũ của danh mục ghế này.
                    </span>
                </div>

                <div class="space-y-1.5">
                    <label for="mo-ta" class="text-xs font-bold text-slate-600 uppercase tracking-wide">Mô tả / Lý do điều chỉnh giá</label>
                    <textarea id="mo-ta" rows="2" placeholder="Ví dụ: Điều chỉnh tăng giá 15% do nâng cấp cơ sở vật chất hoặc áp dụng cho mùa cao điểm..." 
                              class="w-full text-sm px-3.5 py-2.5 bg-white border border-slate-200 rounded-xl shadow-3xs focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all font-medium text-slate-700 placeholder:text-slate-400 resize-none leading-relaxed"></textarea>
                </div>

            </div>
            
            <div class="px-6 py-3.5 border-t border-slate-100 bg-slate-50/50 flex items-center justify-end space-x-2 shrink-0">
                <button type="button" class="px-4 py-2 bg-white hover:bg-slate-100 text-slate-600 text-xs font-bold rounded-xl border border-slate-200 transition-all cursor-pointer">
                    Hủy bỏ
                </button>
                <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl border border-indigo-600 transition-all shadow-md shadow-indigo-100 cursor-pointer">
                    <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Cập nhật giá mới
                </button>
            </div>
        </form>

    </div>
</div>
</body>
</html>
