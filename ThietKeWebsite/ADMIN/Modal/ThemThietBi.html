<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm thiết bị mới - Co-Lab Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-gray-800">

  <div id="addDeviceModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-xs"></div>

    <div class="relative w-full max-w-md bg-white border border-gray-100 rounded-2xl shadow-2xl overflow-hidden transform transition-all animate-in fade-in zoom-in-95 duration-200">
        
        <div class="px-6 py-4 bg-white border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center space-x-2.5">
                <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-600 text-sm">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <div>
                    <h3 class="text-base font-black text-gray-900">Thêm thiết bị mới</h3>
                    <p class="text-xs text-gray-400 font-medium">Khởi tạo thiết bị gốc vào hệ thống</p>
                </div>
            </div>
            <button type="button" class="w-8 h-8 rounded-lg inline-flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>

        <form class="p-6 space-y-5">
            
            <div class="space-y-1.5">
                <label for="newDeviceName" class="text-xs font-black text-gray-500 uppercase tracking-wider block">Tên thiết bị <span class="text-red-500">*</span></label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                        <i class="fa-solid fa-heading text-xs"></i>
                    </span>
                    <input type="text" id="newDeviceName" placeholder="Ví dụ: Màn hình Dell UltraSharp 27 Inch..." required
                           class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-semibold text-gray-900 focus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 transition-all placeholder:font-normal">
                </div>
            </div>

            <div class="space-y-1.5">
                <label for="newIconClass" class="text-xs font-black text-gray-500 uppercase tracking-wider block">Class Icon hiển thị (FontAwesome)</label>
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-gray-400 pointer-events-none">
                            <i class="fa-solid fa-code text-xs"></i>
                        </span>
                        <input type="text" id="newIconClass" placeholder="Ví dụ: fa-solid fa-desktop" 
                               class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm font-mono text-gray-800 focus:outline-none focus:border-indigo-600 focus:ring-4 focus:ring-indigo-50 transition-all placeholder:font-sans placeholder:font-normal">
                    </div>
                    <div class="w-11 h-11 bg-indigo-50 border border-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 text-lg shrink-0" title="Icon Xem trước">
                        <i id="newIconPreview" class="fa-solid fa-desktop"></i>
                    </div>
                </div>
                <p class="text-[11px] text-gray-400 font-medium">Sử dụng class của FontAwesome v6 (Ví dụ: <code class="bg-gray-50 px-1 py-0.5 rounded text-indigo-600 font-bold">fa-solid fa-laptop</code>).</p>
            </div>

        </form>

        <div class="px-6 py-4 bg-slate-50 border-t border-gray-100 flex items-center justify-end space-x-2">
            <button type="button" class="px-4 py-2 bg-white hover:bg-gray-100 text-gray-500 text-xs font-bold rounded-xl border border-gray-200 shadow-3xs transition-all cursor-pointer">
                Hủy bỏ
            </button>
            <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-xs hover:shadow-sm transition-all cursor-pointer">
                Tạo thiết bị
            </button>
        </div>

    </div>
</div>


</body>
</html>
