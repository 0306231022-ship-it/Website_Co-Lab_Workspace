<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - Co-Lab Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div class="flex h-screen overflow-hidden">
        
    

        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-950/40 backdrop-blur-xs z-40 hidden md:hidden"></div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            
            <main class="p-6 space-y-6 max-w-3xl w-full mx-auto flex-1">
                
                <div class="bg-white border border-slate-200/60 rounded-2xl p-6 shadow-xs flex flex-col sm:flex-row items-center justify-between gap-6">
                    <div class="flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left">
                        <div class="relative group">
                            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" alt="Avatar" class="w-20 h-20 rounded-full object-cover border-2 border-indigo-100">
                            <label class="absolute inset-0 bg-black/40 text-white text-[10px] font-bold rounded-full flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                <i class="fa-solid fa-camera text-xs mb-1"></i>Thay ảnh
                                <input type="file" class="hidden">
                            </label>
                        </div>
                        <div>
                            <div class="flex items-center justify-center sm:justify-start gap-2">
                                <h1 class="text-lg font-bold text-slate-900">Bàn Thị Phương Linh</h1>
                                <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded-md border border-indigo-100">Quản trị viên</span>
                            </div>
                            <p class="text-xs text-slate-400 mt-0.5">Mã số nhân sự: <span class="font-mono text-slate-600">EMP-2026-89</span></p>
                        </div>
                    </div>
                </div>

                <div class="space-y-6">
                    
                    <div class="bg-white border border-slate-200/60 rounded-xl shadow-xs p-5 space-y-4">
                        <div class="border-b border-slate-100 pb-3 flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-bold text-slate-800">Thông tin cơ bản</h3>
                                <p class="text-[11px] text-slate-400">Cập nhật thông tin định danh cá nhân của bạn trên hệ thống.</p>
                            </div>
                            <i class="fa-solid fa-id-card text-slate-300 text-lg"></i>
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-slate-600">Họ và tên</label>
                                <input type="text" value="Bàn Thị Phương Linh" class="w-full text-xs font-medium bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-slate-600">Địa chỉ Email</label>
                                <input type="email" value="linh.ntk@co-lab.com.vn" disabled class="w-full text-xs font-medium bg-slate-100 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-500 cursor-not-allowed">
                            </div>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200/60 rounded-xl shadow-xs p-5 space-y-4">
                        <div class="border-b border-slate-100 pb-3 flex items-center justify-between">
                            <div>
                                <h3 class="text-sm font-bold text-slate-800">Đổi mật khẩu</h3>
                                <p class="text-[11px] text-slate-400">Đảm bảo mật khẩu dài hơn 8 ký tự để bảo mật tài khoản tốt nhất.</p>
                            </div>
                            <i class="fa-solid fa-shield-keyhole text-slate-300 text-lg"></i>
                        </div>

                        <div class="space-y-4">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-slate-600">Mật khẩu hiện tại</label>
                                <input type="password" placeholder="••••••••" class="w-full text-xs font-medium bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all">
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="space-y-1.5">
                                    <label class="text-xs font-bold text-slate-600">Mật khẩu mới</label>
                                    <input type="password" placeholder="Nhập mật khẩu mới" class="w-full text-xs font-medium bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-xs font-bold text-slate-600">Xác nhận mật khẩu mới</label>
                                    <input type="password" placeholder="Nhập lại mật khẩu mới" class="w-full text-xs font-medium bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all">
                                </div>
                            </div>
                            <div class="flex justify-end pt-2">
                                <button class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold px-4 py-2 rounded-lg transition shadow-xs cursor-pointer">
                                    Đổi mật khẩu
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-end space-x-3 pt-2">
                        <button type="button" class="px-5 py-2.5 text-xs font-bold text-slate-600 hover:bg-slate-200/60 rounded-xl transition-all cursor-pointer">
                            Huỷ bỏ
                        </button>
                        <button type="submit" class="flex items-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl text-xs font-bold shadow-md shadow-indigo-600/20 transition-all cursor-pointer">
                            <i class="fa-solid fa-floppy-disk"></i>
                            <span>Cập nhật hồ sơ</span>
                        </button>
                    </div>

                </div>
            </main>
        </div>
    </div>


</body>
</html>
