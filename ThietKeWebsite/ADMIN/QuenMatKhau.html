<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Đặt Lại Mật Khẩu
        </h2>
        
        <form id="resetPasswordForm" onsubmit="validateForm(event)" class="space-y-5">
            <div>
                <label for="otp" class="block text-sm font-semibold text-gray-700 mb-1">
                    Mã xác thực OTP
                </label>
                <input 
                    type="text" 
                    id="otp" 
                    placeholder="Nhập mã 6 số" 
                    maxlength="6" 
                    required 
                    pattern="\d{6}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 tracking-widest text-center font-bold text-lg"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">
                    Mật khẩu mới
                </label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Tối thiểu 6 ký tự" 
                    required 
                    minlength="6"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-1">
                    Xác nhận mật khẩu mới
                </label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Nhập lại mật khẩu mới" 
                    required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
                >
                <p id="error-match" class="text-sm text-red-500 mt-1.5 hidden">
                    ⚠️ Mật khẩu xác nhận không trùng khớp!
                </p>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition duration-150 ease-in-out mt-2"
            >
                Xác nhận thay đổi
            </button>
        </form>
    </div>



</body>
</html>
