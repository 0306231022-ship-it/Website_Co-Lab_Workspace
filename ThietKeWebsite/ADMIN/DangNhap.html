<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống - Co-Lab Workspace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            position: relative;
        }
        .auth-bg::before {
            content: "";
            position: absolute;
            top: -20%; right: -10%;
            width: 400px; h-400px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.07) 0%, transparent 70%);
            border-radius: 50%;
        }
    </style>
</head>
<body class="auth-bg font-sans antialiased text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-2xl p-6 md:p-8 space-y-6 relative z-10 animate-in fade-in zoom-in-95 duration-200">
        
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-xl mx-auto shadow-lg shadow-indigo-200">
                <i class="fa-solid fa-cubes"></i>
            </div>
            <div>
                <h1 class="text-base font-black text-slate-950 uppercase tracking-wider">Đăng nhập hệ thống</h1>
                <p class="text-[11px] text-slate-400 font-semibold">Cổng xác thực dùng chung cho Thành viên & Ban quản trị</p>
            </div>
        </div>

        <form id="form-login-chung" action="/login" method="POST" class="space-y-4 text-xs">
            
            <div class="space-y-1.5">
                <label class="block font-black text-slate-400 uppercase tracking-widest">Tài khoản Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="name@example.com"
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <div class="flex items-center justify-between">
                    <label class="block font-black text-slate-400 uppercase tracking-widest">Mật khẩu</label>
                    <a href="#" class="text-[11px] text-indigo-600 hover:text-indigo-700 font-bold">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-10 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all">
                    <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition cursor-pointer">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center select-none pt-0.5">
                <input type="checkbox" id="remember" name="remember" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500 cursor-pointer">
                <label for="remember" class="ml-2 font-semibold text-slate-500 cursor-pointer text-[11px]">Duy trì đăng nhập</label>
            </div>

            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-black uppercase tracking-wider rounded-xl transition shadow-lg shadow-indigo-100 flex items-center justify-center space-x-2 cursor-pointer">
                <span>Xác nhận đăng nhập</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

        <div class="space-y-4 pt-2 border-t border-slate-100">
            <div class="relative flex py-1 items-center">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="flex-shrink mx-3 text-[10px] text-slate-400 font-bold uppercase tracking-wider">Hoặc kết nối nhanh</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>

            <button type="button" class="w-full py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 text-xs font-bold rounded-xl transition flex items-center justify-center space-x-2 cursor-pointer">
                <div class="bg-white px-1.5 py-0.5 rounded text-[8px] font-black tracking-tighter text-blue-600 border border-blue-100">VNPAY</div>
                <span>Đăng nhập qua VNPay ID</span>
            </button>
        </div>

    </div>

</body>
</html>
