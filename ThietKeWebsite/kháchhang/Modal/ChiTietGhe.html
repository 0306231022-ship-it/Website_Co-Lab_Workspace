<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-lab Workspace - Modal Đặt Ghế</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "sans-serif"] },
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Tuỳ chỉnh thanh cuộn cho danh sách khung giờ */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar:hover::-webkit-scrollbar-thumb { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-900/60 font-sans antialiased flex items-center justify-center min-h-screen p-4">

  <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden flex flex-col relative z-10 animate-fade-in-up">
    
    <button class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center text-slate-400 hover:text-rose-500 bg-slate-100 hover:bg-rose-50 rounded-full transition-colors z-10 cursor-pointer">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="p-6 bg-slate-50 border-b border-slate-100 pr-14">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 bg-brand-100 text-brand-600 border border-brand-200 rounded-2xl flex items-center justify-center text-2xl font-black shadow-sm">
            <span id="modalSeatName">A-06</span>
          </div>
          <div>
            <h3 class="text-xl font-bold text-slate-900 leading-tight">Ghế cá nhân</h3>
            <p class="text-xs font-medium text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>Dãy A - Khu Zone A</p>
          </div>
        </div>
      </div>
      
      <div class="flex items-center justify-between mt-4">
        <div class="flex gap-2">
          <span class="bg-white border border-slate-200 text-slate-600 text-[10px] px-2.5 py-1 rounded-md font-bold uppercase tracking-wider"><i class="fa-solid fa-plug mr-1.5 text-brand-500"></i>Ổ cắm</span>
        </div>
        <div class="text-right">
          <span class="text-lg font-extrabold text-brand-600">15.000đ</span>
          <span class="text-xs font-semibold text-slate-500">/giờ</span>
        </div>
      </div>
    </div>

    <div class="p-6 bg-white space-y-6">
      
      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-4">
        
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Ngày đặt chỗ</label>
          </div>
          <div class="relative">
            <i class="fa-regular fa-calendar absolute left-3 top-1/2 -translate-y-1/2 text-brand-500 text-sm"></i>
            <input type="date" class="w-full bg-white border border-slate-300 text-slate-800 text-sm font-bold rounded-xl pl-9 pr-3 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition shadow-sm cursor-pointer" value="2026-06-19">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Giờ bắt đầu</label>
            <div class="relative">
              <i class="fa-regular fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="time" class="w-full bg-white border border-slate-300 text-slate-800 text-sm font-bold rounded-xl pl-9 pr-3 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition shadow-sm cursor-pointer" value="08:00">
            </div>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Giờ kết thúc</label>
            <div class="relative">
              <i class="fa-regular fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
              <input type="time" class="w-full bg-white border border-slate-300 text-slate-800 text-sm font-bold rounded-xl pl-9 pr-3 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition shadow-sm cursor-pointer" value="10:00">
            </div>
          </div>
        </div>

      </div>

      <div>
        <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 flex items-center gap-2">
          <i class="fa-solid fa-list-check text-slate-400"></i> Các khung giờ đã kín
        </h4>
        
        <div class="bg-white rounded-xl space-y-2 max-h-32 overflow-y-auto custom-scrollbar pr-2">
          <div class="flex items-center justify-between border border-slate-100 bg-slate-50 px-3 py-2 rounded-lg">
            <div class="flex items-center gap-2">
              <div class="w-1.5 h-1.5 rounded-full bg-rose-500"></div>
              <span class="text-sm font-bold text-slate-700">10:30 - 12:00</span>
            </div>
            <span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2 py-0.5 rounded border border-rose-100">Đã đặt</span>
          </div>
          
          <div class="flex items-center justify-between border border-slate-100 bg-slate-50 px-3 py-2 rounded-lg">
            <div class="flex items-center gap-2">
              <div class="w-1.5 h-1.5 rounded-full bg-rose-500"></div>
              <span class="text-sm font-bold text-slate-700">14:00 - 16:30</span>
            </div>
            <span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2 py-0.5 rounded border border-rose-100">Đã đặt</span>
          </div>
        </div>
        
        <p class="text-[10px] text-amber-600 mt-2 bg-amber-50 px-2 py-1 rounded border border-amber-100">
          <i class="fa-solid fa-circle-exclamation mr-1"></i> Vui lòng chọn giờ không trùng với các khung giờ trên.
        </p>
      </div>

      <div class="border-t border-slate-200 border-dashed"></div>

      <div>
        <div class="flex justify-between items-end mb-4 px-1">
          <span class="text-sm font-bold text-slate-800">Tạm tính (2 giờ):</span>
          <span class="text-2xl font-extrabold text-brand-600">30.000đ</span>
        </div>

        <a href="./XacNhan_DatCho.html" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-brand-500/30 flex items-center justify-center gap-2 active:scale-[0.98] cursor-pointer">
          Xác nhận đặt chỗ <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>

    </div>
  </div>

</body>
</html>
